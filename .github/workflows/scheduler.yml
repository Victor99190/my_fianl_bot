name: News Automation Bot

on:
  schedule:
    # Runs every 5 minutes - Nepal timezone
    - cron: '*/5 * * * *'
      timezone: "Asia/Kathmandu"
  
  # Manual trigger - useful for testing
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Prevents overlapping runs
    concurrency:
      group: news-bot-sync
      cancel-in-progress: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        # Uses package-lock.json if available for reproducible builds

      - name: Validate Credentials
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          echo "✓ Checking environment variables..."
          if [ -z "$GEMINI_API_KEY" ]; then echo "ERROR: GEMINI_API_KEY not set"; exit 1; fi
          if [ -z "$FB_PAGE_TOKEN" ]; then echo "ERROR: FB_PAGE_TOKEN not set"; exit 1; fi
          if [ -z "$FB_PAGE_ID" ]; then echo "ERROR: FB_PAGE_ID not set"; exit 1; fi
          echo "✓ All credentials present"

      - name: Execute News Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: node auto_post.js

      - name: Upload Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs
          path: bot.log
          retention-days: 7
