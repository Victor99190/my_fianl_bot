name: Nepal News Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - run: |
          if [ -d scraper_repo ]; then
            cd scraper_repo && git pull || true
          else
            git clone --depth 1 https://github.com/Victor99190/final-scrapeer.git scraper_repo
          fi

      # ---------------------------------------------------------
      # NEW: Replaced Artifacts with Cache to persist the database
      # ---------------------------------------------------------
      - name: Persist SQLite Database
        uses: actions/cache@v4
        with:
          path: dedup.db
          # Generates a unique key for saving at the end of THIS run
          key: dedup-db-${{ github.run_id }}
          # Tells GitHub to load the most recent database from previous runs
          restore-keys: |
            dedup-db-
      # ---------------------------------------------------------

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm install

      - run: npm start
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
