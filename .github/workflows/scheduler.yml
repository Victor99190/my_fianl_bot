name: News Automation Bot

on:
  schedule:
    # Runs every 5 minutes - Nepal timezone
    - cron: '*/5 * * * *'
      timezone: "Asia/Kathmandu"
  
  # Manual trigger - useful for testing
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # Prevents overlapping runs
    concurrency:
      group: news-bot-sync
      cancel-in-progress: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --production
        # Installs only production dependencies
        # @google/generative-ai is the only one needed for the bot

      - name: Validate Credentials
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          echo "🔍 Checking credentials..."
          if [ -z "$GEMINI_API_KEY" ]; then echo "❌ GEMINI_API_KEY not set"; exit 1; fi
          if [ -z "$FB_PAGE_TOKEN" ]; then echo "❌ FB_PAGE_TOKEN not set"; exit 1; fi
          if [ -z "$FB_PAGE_ID" ]; then echo "❌ FB_PAGE_ID not set"; exit 1; fi
          echo "✅ All credentials present"

      - name: Execute News Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: node auto_post.js

      - name: Completion Log
        if: always()
        run: |
          echo "✅ Bot execution completed"
          date
