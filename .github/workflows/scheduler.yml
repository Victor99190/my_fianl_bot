name: News Automation Bot

on:
  schedule:
    - cron: '*/25 * * * *'
      timezone: "Asia/Kathmandu"
  repository_dispatch:
    types: [trigger-news-bot]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    concurrency:
      group: news-bot-sync
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone scraper repository
        run: git clone https://github.com/Victor99190/final-scrapeer.git scraper_repo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --production

      - name: Validate secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          echo "Checking required secrets..."
          if [ -z "$GEMINI_API_KEY" ]; then echo "Missing GEMINI_API_KEY"; exit 1; fi
          if [ -z "$FB_PAGE_TOKEN" ]; then echo "Missing FB_PAGE_TOKEN"; exit 1; fi
          if [ -z "$FB_PAGE_ID" ]; then echo "Missing FB_PAGE_ID"; exit 1; fi

      - name: Run validation script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: node validate.js

      - name: Run news bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: node auto_post.js
